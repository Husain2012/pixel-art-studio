<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Art Studio | استوديو بكسل آرت</title>
    <style>
        /* --- المتغيرات العامة والتصميم الأساسي --- */
        :root {
            --bg-color: #0a0b10;
            --panel-bg: rgba(23, 26, 43, 0.6);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-color: #f1f3f9;
            --text-muted: #8a90a6;
            --accent-cyan: #00f2fe;
            --accent-neon: #ff007f;
            --active-glow: rgba(0, 242, 254, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #16192b 0%, #0a0b10 100%);
        }

        /* --- شريط الأدوات العلوي --- */
        .top-bar {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--panel-border);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .studio-title {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(45deg, var(--accent-cyan), #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
        }

        .global-controls {
            display: flex;
            gap: 12px;
        }

        /* --- الأزرار والتفاعل --- */
        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--panel-border);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 12px var(--active-glow);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            color: #000;
            border: none;
            font-weight: 700;
        }
        .btn-primary:hover {
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.5);
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            opacity: 0.9;
        }

        .btn-danger {
            border-color: rgba(255, 0, 127, 0.4);
        }
        .btn-danger:hover {
            border-color: var(--accent-neon);
            box-shadow: 0 0 12px rgba(255, 0, 127, 0.25);
        }

        /* --- مساحة العمل الأساسية --- */
        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* --- شريط الأدوات الجانبي --- */
        .sidebar {
            width: 260px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-left: 1px solid var(--panel-border);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            z-index: 5;
            overflow-y: auto;
        }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .tool-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--panel-border);
            color: var(--text-color);
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            text-align: right;
            transition: all 0.2s ease;
        }

        .tool-btn:hover {
            background: rgba(255, 255, 255, 0.07);
        }

        .tool-btn.active {
            background: rgba(0, 242, 254, 0.1);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px var(--active-glow);
            color: var(--accent-cyan);
        }

        .tool-icon {
            font-size: 1.2rem;
        }

        /* مخصصات الألوان والأحجام */
        .color-picker-wrapper {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--panel-border);
            padding: 12px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .color-input {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            width: 40px;
            height: 40px;
            background: none;
            border: none;
            cursor: pointer;
        }

        .color-input::-webkit-color-swatch {
            border-radius: 6px;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .slider-wrapper {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--panel-border);
            padding: 16px 12px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }

        .range-slider {
            width: 100%;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.1);
            height: 6px;
            border-radius: 3px;
            outline: none;
        }

        .range-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent-cyan);
            cursor: pointer;
            box-shadow: 0 0 8px var(--accent-cyan);
            transition: transform 0.1s;
        }

        .range-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* --- منطقة الرسم الوسطى --- */
        .canvas-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            padding: 40px;
            position: relative;
        }

        .canvas-container {
            position: relative;
            transition: transform 0.15s cubic-bezier(0.25, 1, 0.5, 1);
            transform-origin: center center;
        }

        #pixel-canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            -moz-image-rendering: pixelated;
            background-color: #141622;
            /* خلفية الشفافية المربعات المتبادلة المخصصة للمحترفين */
            background-image: 
                linear-gradient(45deg, #1d2032 25%, transparent 25%), 
                linear-gradient(-45deg, #1d2032 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #1d2032 75%), 
                linear-gradient(-45deg, transparent 75%, #1d2032 75%);
            background-size: 16px 16px;
            background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), 0 0 40px rgba(0, 242, 254, 0.05);
            border-radius: 4px;
            cursor: crosshair;
        }

        /* شبكة تحديد البكسلات العلوية */
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            background-size: calc(100% / 64) calc(100% / 64);
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }

        /* --- التجاوب مع الهواتف الذكية --- */
        @media (max-width: 768px) {
            body {
                height: 100vh;
            }
            .workspace {
                flex-direction: column-reverse;
            }
            .sidebar {
                width: 100%;
                height: auto;
                border-left: none;
                border-top: 1px solid var(--panel-border);
                padding: 16px;
                gap: 16px;
                flex-direction: row;
                overflow-x: auto;
                overflow-y: hidden;
            }
            .sidebar-section {
                flex-shrink: 0;
                min-width: 160px;
            }
            .tools-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 6px;
            }
            .tool-btn {
                padding: 8px;
                font-size: 0.8rem;
                justify-content: center;
                flex-direction: column;
                gap: 4px;
            }
            .color-picker-wrapper, .slider-wrapper {
                padding: 8px;
                height: 100%;
                justify-content: center;
            }
            .slider-header span {
                font-size: 0.75rem;
            }
            .top-bar {
                padding: 10px 16px;
            }
            .studio-title {
                font-size: 1.1rem;
            }
            .btn {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
            .canvas-area {
                padding: 10px;
            }
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="studio-title">Pixel Art Studio</div>
        <div class="global-controls">
            <button class="btn" onclick="zoomCanvas(0.1)" title="تكبير الشبكة">
                <span>➕</span> <span class="desktop-text">تكبير</span>
            </button>
            <button class="btn" onclick="zoomCanvas(-0.1)" title="تصغير الشبكة">
                <span>➖</span> <span class="desktop-text">تصغير</span>
            </button>
            <button class="btn btn-danger" id="clear-btn" title="مسح اللوحة بالكامل">
                <span>🧹</span> <span>مسح الكل</span>
            </button>
            <button class="btn btn-primary" id="download-btn" title="حفظ اللوحة كصورة PNG">
                <span>💾</span> <span>تصدير PNG</span>
            </button>
        </div>
    </header>

    <div class="workspace">
        
        <aside class="sidebar">
            
            <div class="sidebar-section">
                <div class="section-title">الأدوات الأساسية</div>
                <div class="tools-grid">
                    <button class="tool-btn active" id="tool-brush">
                        <span class="tool-icon">🖌️</span>
                        <span>قلم الرسم</span>
                    </button>
                    <button class="tool-btn" id="tool-eraser">
                        <span class="tool-icon">🧽</span>
                        <span>الممحاة</span>
                    </button>
                    <button class="tool-btn" id="tool-bucket">
                        <span class="tool-icon">🪣</span>
                        <span>دلو التعبئة</span>
                    </button>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="section-title">لوحة الألوان</div>
                <div class="color-picker-wrapper">
                    <input type="color" id="color-picker" class="color-input" value="#00f2fe">
                    <div style="display: flex; flex-direction: column;">
                        <span style="font-size: 0.85rem; font-weight: 600;">اللون الحالي</span>
                        <span id="color-hex" style="font-size: 0.75rem; color: var(--text-muted);">#00f2fe</span>
                    </div>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="section-title">حجم الفرشاة</div>
                <div class="slider-wrapper">
                    <div class="slider-header">
                        <span>الحجم الحالي:</span>
                        <span id="size-value" style="color: var(--accent-cyan); font-weight: bold;">1 بكسل</span>
                    </div>
                    <input type="range" id="brush-size" class="range-slider" min="1" max="10" value="1">
                </div>
            </div>

        </aside>

        <main class="canvas-area">
            <div class="canvas-container" id="canvas-container">
                <canvas id="pixel-canvas" width="64" height="64"></canvas>
                <div class="grid-overlay"></div>
            </div>
        </main>

    </div>

    <script>
        // --- إعداد المتغيرات والعناصر الرئيسية ---
        const canvas = document.getElementById('pixel-canvas');
        const ctx = canvas.getContext('2d');
        const canvasContainer = document.getElementById('canvas-container');
        
        const toolBrush = document.getElementById('tool-brush');
        const toolEraser = document.getElementById('tool-eraser');
        const toolBucket = document.getElementById('tool-bucket');
        const colorPicker = document.getElementById('color-picker');
        const colorHex = document.getElementById('color-hex');
        const brushSizeSlider = document.getElementById('brush-size');
        const sizeValue = document.getElementById('size-value');
        const clearBtn = document.getElementById('clear-btn');
        const downloadBtn = document.getElementById('download-btn');

        // حالة التطبيق الداخلية
        let currentTool = 'brush'; // يمكن أن يكون: brush, eraser, bucket
        let currentColor = '#00f2fe';
        let currentSize = 1;
        let isDrawing = false;
        let zoomScale = 1.0;

        // إعداد أبعاد عرض الشبكة بالبكسل الحقيقي على الشاشة لتكون متناسقة
        const baseCanvasSize = Math.min(window.innerWidth * 0.8, window.innerHeight * 0.6, 512);
        canvas.style.width = `${baseCanvasSize}px`;
        canvas.style.height = `${baseCanvasSize}px`;

        // دالة تنظيف اللوحة وجعلها شفافة بشكل افتراضي كامل
        function initCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // --- إدارة الأدوات واختيارها ---
        function setActiveTool(tool, element) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }

        toolBrush.addEventListener('click', () => setActiveTool('brush', toolBrush));
        toolEraser.addEventListener('click', () => setActiveTool('eraser', toolEraser));
        toolBucket.addEventListener('click', () => setActiveTool('bucket', toolBucket));

        colorPicker.addEventListener('input', (e) => {
            currentColor = e.target.value;
            colorHex.textContent = currentColor.toUpperCase();
        });

        brushSizeSlider.addEventListener('input', (e) => {
            currentSize = parseInt(e.target.value);
            sizeValue.textContent = `${currentSize} بكسل`;
        });

        // --- التحكم بالتكبير والتصغير (Zoom) ---
        function zoomCanvas(factor) {
            zoomScale = Math.max(0.5, Math.min(4.0, zoomScale + factor));
            canvasContainer.style.transform = `scale(${zoomScale})`;
        }

        // --- استخراج إحداثيات البكسل الصحيحة من الماوس أو اللمس دقيقة 100% ---
        function getPixelCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX, clientY;

            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            // حساب التموضع النسبي داخل الشبكة وتفادي الخروج عنها
            const x = Math.floor(((clientX - rect.left) / rect.width) * canvas.width);
            const y = Math.floor(((clientY - rect.top) / rect.height) * canvas.height);

            return { x, y };
        }

        // --- عملية الرسم على بكسلات الـ Canvas وسد الثغرات خارج الحدود ---
        function drawPixel(x, y) {
            const radiusOffset = Math.floor((currentSize - 1) / 2);
            const startX = x - radiusOffset;
            const startY = y - radiusOffset;

            // حلقة تكرارية للتكفل بحجم الفرشاة المختار
            for (let i = 0; i < currentSize; i++) {
                for (let j = 0; j < currentSize; j++) {
                    const targetX = startX + i;
                    const targetY = startY + j;

                    // شرط الحماية الصارم (منع الرسم خارج حدود الشبكة نهائياً)
                    if (targetX >= 0 && targetX < canvas.width && targetY >= 0 && targetY < canvas.height) {
                        if (currentTool === 'brush') {
                            ctx.fillStyle = currentColor;
                            ctx.fillRect(targetX, targetY, 1, 1);
                        } else if (currentTool === 'eraser') {
                            ctx.clearRect(targetX, targetY, 1, 1);
                        }
                    }
                }
            }
        }

        // --- خوارزمية التعبئة الذكية السريعة (Flood Fill Algorithm) ---
        function floodFill(startX, startY, fillHex) {
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            const width = canvas.width;
            const height = canvas.height;

            // تحويل الـ HEX المختار إلى RGBA للـ Canvas مصفوفة الـ Data
            const targetColor = getPixelRGBA(startX, startY, data, width);
            const fillRgba = hexToRgb(fillHex);

            // الحماية من اللانهائية إذا تم الضغط على نفس اللون الحالي
            if (colorsMatch(targetColor, fillRgba)) return;

            const queue = [[startX, startY]];

            while (queue.length > 0) {
                const [cx, cy] = queue.shift();

                if (cx < 0 || cx >= width || cy < 0 || cy >= height) continue;

                const currentColor = getPixelRGBA(cx, cy, data, width);
                if (colorsMatch(currentColor, targetColor)) {
                    setPixelRGBA(cx, cy, fillRgba, data, width);

                    queue.push([cx + 1, cy]);
                    queue.push([cx - 1, cy]);
                    queue.push([cx, cy + 1]);
                    queue.push([cx, cy - 1]);
                }
            }
            ctx.putImageData(imgData, 0, 0);
        }

        function getPixelRGBA(x, y, data, width) {
            const index = (y * width + x) * 4;
            return [data[index], data[index + 1], data[index + 2], data[index + 3]];
        }

        function setPixelRGBA(x, y, color, data, width) {
            const index = (y * width + x) * 4;
            data[index] = color[0];
            data[index + 1] = color[1];
            data[index + 2] = color[2];
            data[index + 3] = color[3]; // معتم بالكامل عند التعبئة
        }

        function colorsMatch(c1, c2) {
            return c1[0] === c2[0] && c1[1] === c2[1] && c1[2] === c2[2] && c1[3] === c2[3];
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return [r, g, b, 255];
        }

        // --- إدارة الأحداث (الماوس واللمس للهواتف) ---
        function startDrawingAction(e) {
            const coords = getPixelCoordinates(e);
            
            // تحقق من الـ Boundary الأساسي قبل التنفيذ
            if (coords.x >= 0 && coords.x < canvas.width && coords.y >= 0 && coords.y < canvas.height) {
                isDrawing = true;
                if (currentTool === 'bucket') {
                    floodFill(coords.x, coords.y, currentColor);
                } else {
                    drawPixel(coords.x, coords.y);
                }
            }
        }

        function moveDrawingAction(e) {
            if (!isDrawing || currentTool === 'bucket') return;
            const coords = getPixelCoordinates(e);
            drawPixel(coords.x, coords.y);
        }

        function stopDrawingAction() {
            isDrawing = false;
        }

        // ربط أحداث الماوس (الكمبيوتر)
        canvas.addEventListener('mousedown', startDrawingAction);
        canvas.addEventListener('mousemove', moveDrawingAction);
        window.addEventListener('mouseup', stopDrawingAction);

        // ربط أحداث اللمس (الهواتف الذكية) مع منع السحب الافتراضي للشاشة لمنع الاهتزاز
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startDrawingAction(e);
        }, { passive: false });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            moveDrawingAction(e);
        }, { passive: false });
        
        window.addEventListener('touchend', stopDrawingAction);

        // --- الأزرار العلوية العامة (المسح والتصدير) ---
        clearBtn.addEventListener('click', () => {
            if (confirm('هل أنت متأكد من رغبتك في مسح لوحة الرسم بالكامل؟')) {
                initCanvas();
            }
        });

        downloadBtn.addEventListener('click', () => {
            // إنشاء رابط تحميل وهمي لتصدير الـ PNG بجودتها النظيفة الأصلية للبكسل
            const link = document.createElement('a');
            link.download = `pixel-art-${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        });

        // تشغيل اللوحة فور تحميل الصفحة
        initCanvas();
    </script>
</body>
</html>
